org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8
# Parallel execution causes KSP 2.x "does not hold the state lock" crash with Gradle 8.7+
org.gradle.parallel=false
org.gradle.caching=true
org.gradle.configuration-cache=false
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
android.defaults.buildfeatures.buildconfig=true

# App version — updated by release.yml on tag push
APP_VERSION_NAME=1.0.0
APP_VERSION_CODE=1
