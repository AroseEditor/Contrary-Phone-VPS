name: Release Build & Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag (e.g. v1.0.1)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Determine version ─────────────────────────────────────────────────
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version_tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      # ── Java 17 ───────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Gradle setup (handles caching + wrapper validation) ───────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      # ── Make gradlew executable ───────────────────────────────────────────
      - name: Grant execute permissions for gradlew
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
          else
            echo "ERROR: gradlew not found in repository root"
            ls -la
            exit 1
          fi

      # ── Update version in gradle.properties ───────────────────────────────
      - name: Update version in gradle.properties
        run: |
          VERSION_NAME="${{ steps.version.outputs.version }}"
          VERSION_NAME="${VERSION_NAME#v}"
          VERSION_CODE=$(git tag --sort=version:refname | grep -c "^v" || echo 1)
          sed -i "s/APP_VERSION_NAME=.*/APP_VERSION_NAME=${VERSION_NAME}/" gradle.properties
          sed -i "s/APP_VERSION_CODE=.*/APP_VERSION_CODE=${VERSION_CODE}/" gradle.properties
          echo "Version set to: ${VERSION_NAME} (code ${VERSION_CODE})"

      # ── Decode keystore (only if secrets are set) ─────────────────────────
      - name: Decode keystore
        id: keystore
        run: |
          if [ -n "${{ secrets.SIGNING_KEYSTORE }}" ]; then
            echo "${{ secrets.SIGNING_KEYSTORE }}" | base64 --decode > /tmp/release.keystore
            echo "SIGNING_KEYSTORE_PATH=/tmp/release.keystore" >> $GITHUB_ENV
            echo "STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
            echo "has_keystore=true" >> $GITHUB_OUTPUT
            echo "✅ Keystore decoded — will build signed release APK"
          else
            echo "has_keystore=false" >> $GITHUB_OUTPUT
            echo "⚠️  No SIGNING_KEYSTORE secret — will build unsigned debug APK"
          fi

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build APK
        run: |
          if [ "${{ steps.keystore.outputs.has_keystore }}" = "true" ]; then
            echo "Building signed release APK..."
            ./gradlew assembleRelease --no-daemon --stacktrace
          else
            echo "Building unsigned debug APK..."
            ./gradlew assembleDebug --no-daemon --stacktrace
          fi

      # ── Locate APK ────────────────────────────────────────────────────────
      - name: Find and rename APK
        id: find_apk
        run: |
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found after build"
            find app/build -name "*.apk" 2>/dev/null || true
            exit 1
          fi
          echo "Found APK: ${APK}"
          VERSION="${{ steps.version.outputs.version }}"
          NEW_NAME="Contrary-Phone-VPS-${VERSION}.apk"
          cp "$APK" "/tmp/${NEW_NAME}"
          echo "apk_artifact=/tmp/${NEW_NAME}" >> $GITHUB_OUTPUT
          echo "apk_name=${NEW_NAME}" >> $GITHUB_OUTPUT

      # ── Locate mapping.txt (release only) ─────────────────────────────────
      - name: Find mapping file
        id: find_mapping
        run: |
          MAPPING=$(find app/build/outputs/mapping -name "mapping.txt" 2>/dev/null | head -1)
          if [ -n "$MAPPING" ]; then
            echo "mapping_path=${MAPPING}" >> $GITHUB_OUTPUT
          fi

      # ── Generate changelog ────────────────────────────────────────────────
      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep "^v" | sed -n '2p')

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" | head -50)
          else
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)")
          fi

          if [ -z "$COMMITS" ]; then
            COMMITS="- Initial release"
          fi

          cat > /tmp/release_notes.md << NOTES
          ## What's Changed in ${VERSION}

          ${COMMITS}

          ---
          **Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${VERSION}

          ## Installation
          1. Download \`Contrary-Phone-VPS-${VERSION}.apk\` below
          2. Enable **Install unknown apps** in your Android settings
          3. Install and grant all permissions in the onboarding wizard

          ## Requirements
          - Android 10+ (API 29)
          - ~200 MB free storage (Python 3.11 runtime)
          NOTES

          echo "notes_file=/tmp/release_notes.md" >> $GITHUB_OUTPUT

      # ── Create GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "Latest Release [${{ steps.version.outputs.version }}]"
          body_path: ${{ steps.changelog.outputs.notes_file }}
          draft: true
          prerelease: false
          files: |
            ${{ steps.find_apk.outputs.apk_artifact }}
            ${{ steps.find_mapping.outputs.mapping_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Upload as workflow artifact ────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: contrary-phone-vps-${{ steps.version.outputs.version }}
          path: ${{ steps.find_apk.outputs.apk_artifact }}
          retention-days: 90

      # ── Build summary ─────────────────────────────────────────────────────
      - name: Build summary
        run: |
          echo "## ✅ Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **APK**: ${{ steps.find_apk.outputs.apk_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Signed**: ${{ steps.keystore.outputs.has_keystore }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Release**: Draft created — go to Releases tab to publish" >> $GITHUB_STEP_SUMMARY
